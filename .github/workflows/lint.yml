# Code linting (Clippy) and formatting checks
#
# Reusable workflow called by ci.yml

name: Lint

on:
  workflow_call:

env:
  RUST_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always

jobs:
  # Code linting with Clippy
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-linux-lint

      # Run Clippy with strict warnings (-D warnings)
      # This will fail the build if there are any warnings
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Code formatting check
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Check code formatting without modifying files
      - name: Check code formatting
        run: cargo fmt --check
