# Publish GitHub Release with binary assets and contributor history
#
# Reusable workflow called by ci.yml (only on version tags)

name: Publish

on:
  workflow_call:

env:
  RUST_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always

jobs:
  # Publish GitHub Release
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: polytunnel-*
          path: artifacts
          merge-multiple: true

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pt-*
          path: artifacts
          merge-multiple: true

      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          name: SHA256SUMS
          path: artifacts

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Extract release title from CHANGELOG.md (e.g. "## 🚀 [v0.1.0] — Initial Release" → "v0.1.0 — Initial Release")
          CHANGELOG_TITLE=$(grep -m1 "^\#\# .*\[${TAG}\]" CHANGELOG.md | sed 's/^##[[:space:]]*//' | sed 's/\['"${TAG}"'\]/'"${TAG}"'/' || true)
          RELEASE_TITLE="${CHANGELOG_TITLE:-$TAG}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || true)

          # Generate PR-based changelog via GitHub API
          if [ -n "$PREV_TAG" ]; then
            GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${TAG}" \
              -f previous_tag_name="${PREV_TAG}" \
              --jq '.body')
          else
            GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${TAG}" \
              --jq '.body')
          fi

          # Add icons to GitHub-generated sections
          GENERATED=$(echo "${GENERATED}" \
            | sed "s/^## What's Changed/## 🔄 What's Changed/" \
            | sed "s/^## New Contributors/## 🎉 New Contributors/" \
            | sed "s/^\*\*Full Changelog\*\*/📋 **Full Changelog**/")

          # Extract current version section from CHANGELOG.md
          CHANGELOG=$(awk "/^## .*\\[${TAG}\\]/{found=1; next} found && /^## .*\\[v/{exit} found" CHANGELOG.md)

          # Build contributor avatar section
          CONTRIBUTORS=$(gh api "repos/${{ github.repository }}/commits?sha=${TAG}&per_page=100" \
            --jq '[.[].author | select(.login != null) | {login: .login, avatar: .avatar_url}] | unique_by(.login) | .[]' \
            2>/dev/null || true)

          AVATAR_LINE=""
          if [ -n "$CONTRIBUTORS" ]; then
            while IFS= read -r entry; do
              LOGIN=$(echo "$entry" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d['login'])")
              AVATAR=$(echo "$entry" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d['avatar'])")
              AVATAR_LINE+="[![${LOGIN}](${AVATAR}&s=48)](https://github.com/${LOGIN}) "
            done <<< "$CONTRIBUTORS"
          fi

          # Build release body
          {
            echo "${GENERATED}"
            echo ""
            if [ -n "$AVATAR_LINE" ]; then
              echo "${AVATAR_LINE}"
              echo ""
            fi
            if [ -n "$CHANGELOG" ]; then
              echo "## 📝 Changelog"
              echo ""
              echo "${CHANGELOG}"
              echo ""
            fi
            echo "## 📦 Download"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x86_64 | \`polytunnel-${VERSION}-linux-x86_64.tar.gz\` |"
            echo "| Linux | aarch64 | \`polytunnel-${VERSION}-linux-aarch64.tar.gz\` |"
            echo "| Linux | x86_64 (static) | \`polytunnel-${VERSION}-linux-musl.tar.gz\` |"
            echo "| Linux | aarch64 (static) | \`polytunnel-${VERSION}-linux-aarch64-musl.tar.gz\` |"
            echo "| macOS | aarch64 (Apple Silicon) | \`polytunnel-${VERSION}-macos-aarch64.tar.gz\` |"
            echo "| Windows | x86_64 | \`polytunnel-${VERSION}-windows-x86_64.zip\` |"
            echo "| Windows | aarch64 | \`polytunnel-${VERSION}-windows-aarch64.zip\` |"
            echo ""
            echo "## ⚡ Binary (no extraction needed)"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x86_64 | \`pt-linux-x86_64\` |"
            echo "| Linux | aarch64 | \`pt-linux-aarch64\` |"
            echo "| Linux | x86_64 (static) | \`pt-linux-musl\` |"
            echo "| Linux | aarch64 (static) | \`pt-linux-aarch64-musl\` |"
            echo "| macOS | aarch64 (Apple Silicon) | \`pt-macos-aarch64\` |"
            echo "| Windows | x86_64 | \`pt-windows-x86_64.exe\` |"
            echo "| Windows | aarch64 | \`pt-windows-aarch64.exe\` |"
            echo ""
            echo "## 🔐 Verify checksums"
            echo ""
            echo "\`\`\`bash"
            echo "sha256sum -c SHA256SUMS"
            echo "\`\`\`"
          } > release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or Update GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release_notes.md
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release_notes.md \
              --verify-tag \
              artifacts/*
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
