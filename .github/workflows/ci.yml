# Continuous Integration orchestrator for Polytunnel
#
# Delegates to reusable workflows for modularity:
#   build.yml    — Debug builds across all platforms
#   test.yml     — Unit tests and example project tests
#   lint.yml     — Clippy linting and format checks
#   coverage.yml — Code coverage with llvm-cov
#   security.yml — cargo-audit dependency scanning
#   release.yml  — Release builds and SHA256 checksums
#   publish.yml  — GitHub Release publishing

name: CI

# Trigger conditions
on:
  push:
    # Run on all branches except docs
    branches:
      - '**'
      - '!docs'
    # Run on version tags for release publishing
    tags:
      - 'v*'
  pull_request:
    # Run on all pull requests except docs
    branches:
      - '**'
      - '!docs'

env:
  # Use stable Rust toolchain
  RUST_TOOLCHAIN: stable
  # Set Cargo output format to JSON for better parsing
  CARGO_TERM_COLOR: always

jobs:
  # Debug builds on all platforms (parallel)
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # Unit tests and example tests (parallel)
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # Clippy + format check (parallel)
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  # Code coverage (parallel)
  coverage:
    uses: ./.github/workflows/coverage.yml
    secrets: inherit

  # Security audit (parallel)
  security:
    uses: ./.github/workflows/security.yml
    secrets: inherit

  # Release builds + checksum (only on main/release/tags)
  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v'))
    uses: ./.github/workflows/release.yml
    secrets: inherit

  # Publish GitHub Release (only on version tags)
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release, test, lint, security]
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    permissions:
      contents: write
