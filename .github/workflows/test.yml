# Unit tests and example project tests
#
# Reusable workflow called by ci.yml

name: Test

on:
  workflow_call:

env:
  RUST_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always

jobs:
  # Run all unit tests (Linux only)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-linux-test

      # Run tests with output (don't stop on first failure)
      - name: Run tests
        run: cargo test --workspace --verbose

      # Run documentation tests
      - name: Run doc tests
        run: cargo test --doc --workspace --verbose

  # Build and test all example projects
  test-examples:
    name: Test Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-examples

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run example tests
        run: bash scripts/test-examples.sh

      - name: Upload example logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-logs
          path: logs/examples/
